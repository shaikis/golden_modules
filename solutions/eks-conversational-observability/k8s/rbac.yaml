# Minimal read-only RBAC for the kubectl troubleshooting agent
# The agent runs as a pod in the cluster and executes safe diagnostic commands.
# Apply with: kubectl apply -f k8s/rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: troubleshooting-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: troubleshooting-agent-role
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - nodes
      - namespaces
      - events
      - configmaps
      - persistentvolumeclaims
      - persistentvolumes
      - replicationcontrollers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: troubleshooting-agent-binding
subjects:
  - kind: ServiceAccount
    name: troubleshooting-agent
    namespace: default
roleRef:
  kind: ClusterRole
  name: troubleshooting-agent-role
  apiGroup: rbac.authorization.k8s.io
