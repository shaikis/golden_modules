<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EDF5F9"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F4C5C"/>
      <stop offset="1" stop-color="#1B6B7F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #D9EEF4; }
      .section { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #16324F; }
      .panel { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #102A43; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #12324A; }
      .body { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #425466; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #567086; }
    </style>
  </defs>

  <rect width="1600" height="960" fill="url(#bg)"/>
  <rect width="1600" height="120" fill="url(#header)"/>
  <text x="52" y="54" class="title">Multi-Tenant KMS Strategy</text>
  <text x="52" y="86" class="subtitle">Centralized tenant keys, alias-scoped role assumption, and workload-side client-side encryption</text>

  <rect x="40" y="150" width="1520" height="760" rx="28" fill="#FFFFFF" stroke="#D7E2EA" stroke-width="2"/>

  <text x="84" y="198" class="section">CENTRAL ACCOUNT</text>
  <rect x="72" y="220" width="668" height="318" rx="24" fill="#F8FAFC" stroke="#D9E2EC" filter="url(#shadow)"/>
  <rect x="100" y="248" width="210" height="44" rx="14" fill="#E6FFFA"/>
  <text x="126" y="276" class="panel">Tenant Key Management</text>

  <rect x="100" y="322" width="188" height="78" rx="18" fill="#EEF2FF" stroke="#A5B4FC"/>
  <text x="140" y="350" class="label">ServiceARole</text>
  <text x="118" y="372" class="small">assumed by workload role</text>

  <rect x="324" y="322" width="168" height="78" rx="18" fill="#F0FDFA" stroke="#99F6E4"/>
  <text x="355" y="350" class="label">Tenant Key 1</text>
  <text x="340" y="372" class="small">alias/customer-tenant-001</text>

  <rect x="516" y="322" width="168" height="78" rx="18" fill="#F0FDFA" stroke="#99F6E4"/>
  <text x="547" y="350" class="label">Tenant Key 2</text>
  <text x="532" y="372" class="small">alias/customer-tenant-002</text>

  <rect x="100" y="430" width="584" height="72" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="126" y="458" class="label">Policy pattern</text>
  <text x="126" y="482" class="body">Allow KMS usage through alias conditions such as `kms:RequestAlias = alias/customer-*`.</text>

  <text x="860" y="198" class="section">WORKLOAD ACCOUNT</text>
  <rect x="836" y="220" width="688" height="318" rx="24" fill="#F8FAFC" stroke="#D9E2EC" filter="url(#shadow)"/>
  <rect x="864" y="248" width="204" height="44" rx="14" fill="#DBEAFE"/>
  <text x="896" y="276" class="panel">Application Workload</text>

  <rect x="864" y="322" width="182" height="78" rx="18" fill="#EEF2FF" stroke="#A5B4FC"/>
  <text x="895" y="350" class="label">ServiceBRole</text>
  <text x="886" y="372" class="small">Lambda execution role</text>

  <rect x="1080" y="322" width="184" height="78" rx="18" fill="#E0F2FE" stroke="#93C5FD"/>
  <text x="1127" y="350" class="label">Lambda</text>
  <text x="1099" y="372" class="small">tenant-aware encryption flow</text>

  <rect x="1298" y="322" width="194" height="78" rx="18" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="1326" y="350" class="label">DynamoDB Table</text>
  <text x="1333" y="372" class="small">stores ciphertext only</text>

  <rect x="864" y="430" width="628" height="72" rx="18" fill="#F5F3FF" stroke="#C4B5FD"/>
  <text x="892" y="458" class="label">Runtime session policy</text>
  <text x="892" y="482" class="body">The Lambda assumes `ServiceARole` with a tenant-scoped inline STS policy tied to one alias.</text>

  <path d="M1046 361 H1080" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1264 361 H1298" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M740 361 H836" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="760" y="340" class="small">sts:AssumeRole</text>

  <text x="84" y="592" class="section">REQUEST FLOW</text>
  <rect x="72" y="614" width="1452" height="226" rx="24" fill="#F8FAFC" stroke="#D9E2EC" filter="url(#shadow)"/>

  <rect x="100" y="650" width="224" height="86" rx="18" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="128" y="682" class="label">1. Tenant request</text>
  <text x="128" y="706" class="body">JWT or trusted context carries</text>
  <text x="128" y="726" class="body">the tenant ID</text>

  <rect x="384" y="650" width="240" height="86" rx="18" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="412" y="682" class="label">2. Assume central role</text>
  <text x="412" y="706" class="body">STS session policy narrows access</text>
  <text x="412" y="726" class="body">to one tenant alias</text>

  <rect x="684" y="650" width="226" height="86" rx="18" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="712" y="682" class="label">3. Encrypt data</text>
  <text x="712" y="706" class="body">KMS `Encrypt` uses</text>
  <text x="712" y="726" class="body">alias/customer-tenant-id</text>

  <rect x="970" y="650" width="230" height="86" rx="18" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="998" y="682" class="label">4. Persist ciphertext</text>
  <text x="998" y="706" class="body">Only ciphertext lands in the</text>
  <text x="998" y="726" class="body">shared DynamoDB table</text>

  <rect x="1260" y="650" width="232" height="86" rx="18" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="1288" y="682" class="label">5. Tenant isolation</text>
  <text x="1288" y="706" class="body">One tenant key per tenant,</text>
  <text x="1288" y="726" class="body">shared platform services</text>

  <path d="M324 693 H384" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M624 693 H684" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M910 693 H970" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1200 693 H1260" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="100" y="778" width="1392" height="34" rx="17" fill="#E6FFFA"/>
  <text x="128" y="800" class="small">Core idea: centralize key lifecycle and governance, but keep tenant isolation through one CMK per tenant and runtime alias-scoped access.</text>
</svg>
